  "Asset Misappropriation": [
    {type:"h", text:"Beginner Deep Dive: Asset Misappropriation"},
    {type:"sub", text:"What makes asset misappropriation different"},
    {type:"p", text:"Asset misappropriation is the theft or misuse of an organization's resources. It is usually committed by employees or insiders who already have some level of access. The key idea is that the organization owns the asset, but the fraudster converts it for personal benefit."},
    {type:"p", text:"The CFE exam often tests whether you can identify when the theft happens. Skimming happens before the money is recorded. Cash larceny happens after the money is recorded. Fraudulent disbursements happen when the organization is tricked into sending money out. Non-cash theft involves inventory, supplies, equipment, or information."},
    {type:"sub", text:"Skimming step by step"},
    {type:"p", text:"In skimming, the customer pays, but the organization never records the payment properly. Because the transaction is missing from the books, there may be no obvious cash shortage. That is why skimming is often detected by indirect evidence, such as customer complaints, inventory shortages, lower-than-expected sales, or unusual voids and discounts."},
    {type:"p", text:"Receivables skimming is more complicated because the customer expects their account to be credited. The fraudster may use lapping, false credits, write-offs, or account adjustments to hide the missing payment. The examiner should compare payment dates, deposit dates, posting dates, and customer account histories."},
    {type:"sub", text:"Cash larceny step by step"},
    {type:"p", text:"In cash larceny, the cash was recorded first, then stolen. This creates a book-to-actual difference. For example, the register says $1,000 should be in the drawer, but only $900 is present. Because the records show the money should exist, larceny often leaves a clearer accounting trail than skimming."},
    {type:"p", text:"Common concealment methods include false voids, false refunds, altered deposit slips, missing cash counts, and unsupported journal entries. A strong response is independent cash counts, deposit reconciliation, register exception reports, and camera review where appropriate."},
    {type:"sub", text:"Billing schemes in plain language"},
    {type:"p", text:"Billing fraud means the organization pays money it should not pay. Shell companies are fake vendors controlled by the fraudster. Pass-through vendors add no value but mark up goods. Personal purchases involve using company funds for personal benefit. Duplicate payment schemes rely on paying the same or similar invoice more than once."},
    {type:"p", text:"Controls for billing schemes include approved vendor setup, vendor master file review, employee-vendor matching, three-way matching, invoice approval, duplicate payment testing, and independent review of vendor bank account changes."},
    {type:"sub", text:"Payroll and expense schemes"},
    {type:"p", text:"Payroll fraud can involve ghost employees, falsified hours, unauthorized pay rates, commission manipulation, or improper bonuses. The best evidence often comes from comparing HR records, payroll records, supervisor approvals, timekeeping data, system access logs, and physical observation."},
    {type:"p", text:"Expense reimbursement fraud usually involves fake receipts, inflated expenses, duplicate submissions, personal expenses labeled as business, or mileage exaggeration. The examiner should look for round-dollar claims, weekend claims, repeated vendors, missing receipts, and expenses inconsistent with the employee's role."},
    {type:"callout", text:"Exam tip: First identify the asset, then identify the point of theft, then identify the concealment method, then choose a control that addresses that specific point."}
  ],
  "Financial Statement Fraud": [
    {type:"h", text:"Beginner Deep Dive: Financial Statement Fraud"},
    {type:"sub", text:"Why this fraud is different"},
    {type:"p", text:"Financial statement fraud is usually designed to make the organization look healthier than it really is. It may help executives meet targets, increase stock prices, satisfy lenders, obtain bonuses, hide poor performance, or avoid covenant violations. Unlike a simple theft, the benefit may be indirect."},
    {type:"p", text:"The exam frequently contrasts frequency and loss. Asset misappropriation happens more often, but financial statement fraud usually causes larger losses because it can mislead investors, lenders, regulators, employees, and the market for a long time."},
    {type:"sub", text:"Revenue schemes"},
    {type:"p", text:"Revenue is a common target because it is a major measure of success. Fraudsters may record sales that never happened, record sales too early, hide side agreements, ship goods that the customer did not really order, or record round-trip transactions with no business substance."},
    {type:"p", text:"A beginner should connect revenue fraud to evidence. Real revenue usually has a customer order, approval, shipment or service delivery, invoice, collection, and no secret right of return. If documents exist but cash never arrives, receivables grow, or sales reverse after period-end, the examiner should ask whether the revenue was real and earned."},
    {type:"sub", text:"Expense and liability schemes"},
    {type:"p", text:"Understating expenses makes income look higher. One method is to capitalize expenses as assets. Another is to delay recording invoices until the next period. Another is to omit liabilities entirely. These schemes often improve net income, working capital, and debt covenant ratios."},
    {type:"p", text:"To detect concealed expenses and liabilities, examiners look at payments after year-end, unmatched receiving reports, vendor statements, legal letters, board minutes, and recurring expenses that suddenly disappear. The question is: did the company receive goods or services or incur obligations that were not recorded?"},
    {type:"sub", text:"Asset valuation schemes"},
    {type:"p", text:"Overstated assets can make a company look stronger. Inventory may be counted twice, valued too high, or not written down when obsolete. Receivables may include fake customers or balances that will not be collected. Fixed assets may include costs that should have been expensed."},
    {type:"p", text:"Valuation is an exam theme because fraud can hide inside estimates. Estimates require judgment, and judgment can be abused. Bad debt reserves, warranty reserves, impairment estimates, percentage-of-completion estimates, and inventory obsolescence allowances all require professional skepticism."},
    {type:"sub", text:"Journal entries and management override"},
    {type:"p", text:"Management override means leaders use authority to bypass normal controls. This is dangerous because senior personnel can pressure staff, approve unusual entries, or create top-side adjustments after normal processing is complete. Even strong systems can fail when management can override them without independent review."},
    {type:"p", text:"Red flags include entries posted late at night, at period end, by unusual users, with vague descriptions, to unusual account combinations, for round amounts, or without support. The examiner should trace entries to evidence and ask whether the business purpose is legitimate."},
    {type:"callout", text:"Exam tip: If a scenario involves making financial results look better, think revenue overstatement, expense understatement, asset overstatement, liability understatement, disclosure omission, or management override."}
  ],
  "Corruption & Other Schemes": [
    {type:"h", text:"Beginner Deep Dive: Corruption and Cyber-Enabled Fraud"},
    {type:"sub", text:"The core idea of corruption"},
    {type:"p", text:"Corruption occurs when someone abuses entrusted power in a business transaction for personal benefit. The organization may still receive goods or services, but the decision was corrupted. This makes corruption different from simple theft: the harm is often hidden in inflated prices, poor quality, unfair vendor selection, or regulatory exposure."},
    {type:"p", text:"The main forms are bribery, kickbacks, conflicts of interest, illegal gratuities, and economic extortion. Bribery and kickbacks involve something of value influencing a decision. Conflicts of interest involve undisclosed personal interests. Economic extortion involves demanding payment through pressure or authority."},
    {type:"sub", text:"Vendor and procurement corruption"},
    {type:"p", text:"Procurement is high risk because employees choose vendors, approve prices, confirm receipt, and influence payment. A corrupt employee may steer work to a favored vendor, leak bid information, split purchases to avoid approval thresholds, accept gifts, or approve inflated invoices."},
    {type:"p", text:"Useful evidence includes bid files, vendor ownership records, employee disclosures, email communications, pricing comparisons, approval histories, and relationships between employees and vendors. Data matching can reveal shared addresses, phone numbers, bank accounts, or tax IDs."},
    {type:"sub", text:"International bribery"},
    {type:"p", text:"International corruption risk increases when companies use agents, consultants, distributors, customs brokers, or intermediaries. Payments may be disguised as commissions, consulting fees, marketing expenses, charitable donations, travel, gifts, or facilitation-type expenses."},
    {type:"p", text:"Controls include third-party due diligence, contract anti-bribery clauses, approval of gifts and entertainment, payment review, books-and-records controls, and monitoring of high-risk countries and intermediaries. The CFE exam may test both the payment itself and the false accounting used to hide it."},
    {type:"sub", text:"Cyber-enabled fraud"},
    {type:"p", text:"Cyber-enabled fraud uses technology to commit or conceal deception. Business email compromise is a common example. The attacker impersonates an executive, vendor, or trusted party and pressures an employee to send money, change bank details, or disclose sensitive information."},
    {type:"p", text:"The strongest control for payment redirection is independent verification using a trusted contact method already on file. Employees should not rely on phone numbers or links in the suspicious message. Other controls include multi-factor authentication, email filtering, payment approval workflows, and security awareness training."},
    {type:"callout", text:"Exam tip: Corruption questions often ask who had an undisclosed interest, what thing of value was exchanged, how the decision was influenced, and which control would expose the relationship."}
  ],
  "Investigation Principles": [
    {type:"h", text:"Beginner Deep Dive: Investigation Principles"},
    {type:"sub", text:"What a fraud examination is trying to answer"},
    {type:"p", text:"A fraud examination is not just a search for suspicious facts. It is a structured process for answering whether fraud occurred, who was involved, how it happened, how much was lost, what evidence supports the conclusion, and what should be done next."},
    {type:"p", text:"The examiner should begin with a clear allegation or predicate. A vague feeling that something is wrong is not enough. Predicate can come from a tip, unusual transaction, audit finding, missing asset, customer complaint, data anomaly, or other specific fact that justifies inquiry."},
    {type:"sub", text:"Planning the investigation"},
    {type:"p", text:"Planning includes defining scope, identifying records, preserving evidence, deciding who should be involved, considering legal privilege, assessing conflicts of interest, and sequencing procedures. Good planning prevents the examiner from alerting suspects too early or collecting evidence in a way that cannot be used later."},
    {type:"p", text:"A useful plan asks: What scheme is suspected? What records should exist if the scheme happened? Who had access? Who approved transactions? Where would the money or asset go? What controls should have operated? Who can explain the process?"},
    {type:"sub", text:"Evidence basics"},
    {type:"p", text:"Evidence can be documentary, testimonial, physical, or digital. Documentary evidence includes invoices, contracts, emails, bank records, payroll reports, and accounting entries. Testimonial evidence comes from interviews. Digital evidence includes metadata, logs, access records, and recovered files. Physical evidence includes original documents, devices, or assets."},
    {type:"p", text:"The strength of evidence improves when sources corroborate each other. An invoice alone may not prove goods were received. But an invoice, purchase order, receiving report, shipping record, payment record, and employee admission together create a much stronger picture."},
    {type:"sub", text:"Chain of custody and preservation"},
    {type:"p", text:"Chain of custody is the record of who collected, handled, stored, transferred, and analyzed evidence. It matters because evidence can be challenged if someone cannot show it was protected from alteration. Digital evidence should be preserved through forensic methods when possible, especially when litigation or criminal referral is possible."},
    {type:"p", text:"Preservation also means stopping routine destruction. A litigation hold may be needed so emails, chat messages, accounting records, security footage, and device data are not deleted. Delay can cause important evidence to disappear."},
    {type:"sub", text:"From theory to conclusion"},
    {type:"p", text:"Fraud theories are working explanations, not final answers. The examiner may begin with a theory such as shell company billing, then test it against evidence. If evidence contradicts the theory, the theory must change. This protects objectivity and reduces confirmation bias."},
    {type:"callout", text:"Exam tip: In investigation questions, choose the answer that preserves evidence, maintains objectivity, starts with less intrusive steps, and avoids premature accusations."}
  ],
  "Interview Techniques": [
    {type:"h", text:"Beginner Deep Dive: Interview Techniques"},
    {type:"sub", text:"Why interviews matter"},
    {type:"p", text:"Documents show what was recorded, but people explain how processes work, why exceptions occurred, who had access, and what was not documented. Interviews help identify witnesses, clarify records, test explanations, and sometimes obtain admissions."},
    {type:"p", text:"The CFE exam often tests interview sequence. Start with neutral third-party or background witnesses, then knowledgeable employees, then subjects or suspects after enough evidence has been gathered. This reduces the chance of alerting the subject before the examiner understands the facts."},
    {type:"sub", text:"Question types"},
    {type:"p", text:"Open-ended questions invite a narrative: 'Tell me what happened.' They are useful because they let the interviewee provide information in their own words. Closed-ended questions ask for specific facts: 'Who approved the invoice?' They are useful after the examiner has the broad story."},
    {type:"p", text:"Leading questions suggest the answer and should be used carefully. A question like 'You knew the invoice was fake, right?' may contaminate the response and appear unfair. Better questions ask for facts first, then confront contradictions only when appropriate."},
    {type:"sub", text:"Rapport and listening"},
    {type:"p", text:"Rapport does not mean being casual or manipulative. It means creating a professional environment where the person understands the purpose of the interview and feels able to speak. Good interviewers listen more than they talk, avoid unnecessary interruptions, and document important statements accurately."},
    {type:"p", text:"Silence can be useful. After asking an important question, allow the person time to answer. People often provide more detail when the interviewer does not rush to fill the silence. Follow-up questions should clarify who, what, when, where, why, and how."},
    {type:"sub", text:"Admission-seeking interviews"},
    {type:"p", text:"An admission-seeking interview should not be the first step. It occurs when the examiner has enough evidence to confront the subject fairly. The goal is truthful information, not a forced confession. Coercion, threats, promises, or deceptive statements can create legal and ethical problems."},
    {type:"p", text:"A good admission statement should be voluntary, specific, accurate, and corroborated. It should identify what happened, when, how, why, who was involved, and what documents or transactions support the admission. A confession without supporting evidence is weaker than a statement supported by records."},
    {type:"sub", text:"Evaluating deception carefully"},
    {type:"p", text:"No single behavior proves lying. Nervousness, lack of eye contact, or hesitation may result from stress rather than deception. Statement analysis and behavioral observations are leads for follow-up, not proof. The examiner should compare statements to documents, data, and other witnesses."},
    {type:"callout", text:"Exam tip: When choosing an interview answer, favor open-ended questions early, specific questions later, neutral witnesses before suspects, and corroboration before conclusions."}
  ],
  "Legal Framework": [
    {type:"h", text:"Beginner Deep Dive: Legal Framework"},
    {type:"sub", text:"Civil, criminal, and internal matters"},
    {type:"p", text:"Fraud can lead to internal discipline, civil lawsuits, regulatory actions, or criminal prosecution. Internal discipline focuses on employment consequences. Civil cases focus on money, injunctions, restitution, or rescission. Criminal cases focus on punishment by the government."},
    {type:"p", text:"The burden of proof differs. Criminal cases require proof beyond a reasonable doubt. Civil cases usually require preponderance of the evidence, and some fraud claims may require clear and convincing evidence. A CFE should understand these standards but should not provide legal advice unless qualified to do so."},
    {type:"sub", text:"Elements of fraud"},
    {type:"p", text:"Many fraud claims include a false statement or concealment, knowledge of falsity, intent to induce reliance, actual reliance, causation, and damages. Criminal fraud also requires the required mental state, often intent to defraud."},
    {type:"p", text:"Intent is often proven indirectly. A person rarely writes, 'I intend to commit fraud.' Instead, intent may be inferred from concealment, false documents, repeated conduct, personal benefit, inconsistent explanations, destruction of evidence, or efforts to bypass controls."},
    {type:"sub", text:"Evidence rules in plain language"},
    {type:"p", text:"Relevance means evidence helps prove or disprove something important. Authentication means showing evidence is what it claims to be. Hearsay rules limit certain out-of-court statements, but business records often have an exception when made in the regular course of business."},
    {type:"p", text:"The best evidence rule matters when the contents of a document are at issue. Originals are preferred, but duplicates are often acceptable unless authenticity is seriously disputed. Fraud examiners should preserve originals when possible and document how copies were obtained."},
    {type:"sub", text:"Privilege and work product"},
    {type:"p", text:"Attorney-client privilege protects confidential communications for legal advice. Work product protects materials prepared in anticipation of litigation. When a fraud examiner works under counsel, some work may be protected, but privilege can be waived if information is shared too broadly."},
    {type:"p", text:"The crime-fraud exception means privilege does not protect communications made to further a crime or fraud. Also, privilege generally protects communications, not the underlying facts. A CFE should coordinate with counsel when privilege is important."},
    {type:"sub", text:"Common statutes"},
    {type:"p", text:"Mail fraud and wire fraud are broad because many schemes use mail, email, phone, wires, or internet communications. The False Claims Act addresses fraud against the government. The Bank Secrecy Act and anti-money laundering rules address suspicious financial activity. SOX and Dodd-Frank include public company and whistleblower provisions."},
    {type:"callout", text:"Exam tip: If the question asks what a CFE should do legally, the safest answer is often to preserve evidence, document facts, and consult counsel rather than make legal conclusions alone."}
  ],
  "Criminology & Fraud Theory": [
    {type:"h", text:"Beginner Deep Dive: Fraud Theory"},
    {type:"sub", text:"Why people commit fraud"},
    {type:"p", text:"Fraud theory helps explain conditions that make fraud more likely. It does not excuse misconduct, and it does not prove that a specific person committed fraud. It gives examiners a framework for understanding pressure, opportunity, rationalization, capability, and organizational culture."},
    {type:"p", text:"The Fraud Triangle is the foundation: pressure, opportunity, and rationalization. Pressure motivates. Opportunity enables. Rationalization justifies. Organizations have the most control over opportunity, which is why internal controls are so important."},
    {type:"sub", text:"Pressure"},
    {type:"p", text:"Pressure can be personal or organizational. Personal pressures include debt, addiction, medical expenses, divorce, or lifestyle demands. Organizational pressures include unrealistic targets, fear of missing earnings expectations, pressure from supervisors, or compensation tied to financial metrics."},
    {type:"p", text:"A key word is non-shareable. Cressey's research emphasized that fraudsters often perceive the problem as something they cannot admit or discuss. They may feel trapped and look for a secret solution."},
    {type:"sub", text:"Opportunity"},
    {type:"p", text:"Opportunity is created by access, weak controls, poor oversight, excessive trust, management override, lack of segregation, or poor monitoring. A person under pressure may not commit fraud if they believe the chance of detection is high."},
    {type:"p", text:"Controls reduce opportunity by making unauthorized actions harder, requiring independent review, creating evidence, or increasing the likelihood of detection. Mandatory vacations, job rotation, reconciliations, system access reviews, and surprise audits all affect perceived opportunity."},
    {type:"sub", text:"Rationalization and capability"},
    {type:"p", text:"Rationalization allows the fraudster to see themselves as justified: 'I will pay it back,' 'I deserve it,' 'They underpay me,' or 'Everyone does it.' Ethical culture and consistent discipline make rationalization harder."},
    {type:"p", text:"The Fraud Diamond adds capability. A person may have pressure, opportunity, and rationalization but still lack the skill, position, confidence, or stress tolerance to carry out a complex fraud. Capability is especially important in management fraud and cyber-enabled schemes."},
    {type:"sub", text:"Culture and normalization"},
    {type:"p", text:"White-collar crime is influenced by culture. If small violations are ignored, employees may learn that rules are flexible. Over time, unethical behavior can become normalized. Tone at the top, tone in the middle, and fair enforcement help prevent this slide."},
    {type:"callout", text:"Exam tip: Fraud theory questions are usually asking you to identify which element is present or which control would reduce opportunity."}
  ],
  "Corporate Governance & Prevention": [
    {type:"h", text:"Beginner Deep Dive: Governance and Prevention"},
    {type:"sub", text:"Who is responsible for fraud prevention"},
    {type:"p", text:"Fraud prevention is not only the job of internal audit. The board oversees risk. The audit committee oversees financial reporting and investigations. Management designs and operates controls. Employees follow policies and report concerns. Internal audit provides independent assurance. Compliance and legal functions support policy, training, and investigations."},
    {type:"p", text:"When these roles are unclear, fraud risk increases. For example, if management investigates allegations against itself without independent oversight, employees may not trust the process and evidence may not be preserved properly."},
    {type:"sub", text:"Tone at the top and tone in the middle"},
    {type:"p", text:"Tone at the top is leadership's example. Tone in the middle is what supervisors actually reinforce day to day. Employees often follow the behavior their direct manager rewards. A company can have a beautiful code of ethics but still have a weak culture if managers pressure staff to ignore controls."},
    {type:"p", text:"Consistent discipline matters. If senior employees avoid consequences while lower-level employees are punished, the organization creates rationalizations for future misconduct. Fairness is a fraud deterrence tool."},
    {type:"sub", text:"Fraud risk assessment"},
    {type:"p", text:"A fraud risk assessment should be practical and scheme-based. Instead of saying 'cash fraud could occur,' list specific schemes: skimming, cash larceny, deposit theft, false refunds, void manipulation, and register theft. Then identify who could do it, what controls exist, and what evidence would show failure."},
    {type:"p", text:"Risk is usually evaluated by likelihood and impact. A rare but catastrophic risk may deserve strong controls. A frequent low-dollar risk may deserve automated monitoring. The best assessments lead to action, not just a report."},
    {type:"sub", text:"Hotlines and reporting"},
    {type:"p", text:"Tips are a leading detection method because employees and vendors often see problems before auditors do. A hotline should be easy to use, allow anonymous reporting where permitted, protect against retaliation, and route serious complaints to independent reviewers."},
    {type:"p", text:"A hotline is only effective if people trust it. If reporters are ignored or punished, employees will stop reporting. Tracking allegations, documenting follow-up, and reporting trends to the audit committee strengthen the program."},
    {type:"sub", text:"Preventive and detective controls"},
    {type:"p", text:"Preventive controls include approvals, access limits, segregation of duties, vendor due diligence, and required documentation. Detective controls include reconciliations, exception reports, audits, variance analysis, and hotline investigations. Both are needed."},
    {type:"p", text:"Small organizations may not have enough staff for perfect segregation. They need compensating controls, such as owner review, bank statement review by someone outside cash handling, external bookkeeping support, or system reports reviewed by management."},
    {type:"callout", text:"Exam tip: Governance answers usually favor independence, oversight, documentation, non-retaliation, timely investigation, and remediation tracking."}
  ],
  "Ethics & Professional Standards": [
    {type:"h", text:"Beginner Deep Dive: Ethics and Professional Standards"},
    {type:"sub", text:"Why ethics are tested on the CFE exam"},
    {type:"p", text:"Fraud examiners deal with sensitive facts, reputations, employment decisions, money, and possible criminal conduct. Poor investigative behavior can harm innocent people, destroy evidence, waive privilege, or expose the organization to liability. Ethics are therefore not separate from the investigation; they are part of doing it correctly."},
    {type:"p", text:"The main professional duties are honesty, objectivity, competence, confidentiality, and due professional care. The exam may test these duties through scenarios where a client pressures the examiner, a conflict exists, or the examiner is asked to reach conclusions beyond the evidence."},
    {type:"sub", text:"Objectivity"},
    {type:"p", text:"Objectivity means the examiner follows the evidence even when the result is inconvenient. It also means considering evidence that may clear a suspect. A report that only includes facts supporting a desired conclusion is not objective."},
    {type:"p", text:"Objectivity can be threatened by personal relationships, financial interests, prior involvement, pressure from management, or emotional reactions to the allegation. When objectivity is impaired, the examiner should disclose the issue, seek guidance, or withdraw if necessary."},
    {type:"sub", text:"Competence"},
    {type:"p", text:"Competence means accepting only work the examiner can perform properly. A CFE may understand fraud concepts but still need help from attorneys, digital forensic specialists, valuation experts, tax experts, or industry specialists. Asking for help is a sign of professional care, not weakness."},
    {type:"p", text:"Due professional care includes planning, supervision, sufficient evidence, accurate documentation, appropriate methods, and clear reporting. It does not require perfection, but it requires reasonable professional judgment."},
    {type:"sub", text:"Confidentiality and reporting"},
    {type:"p", text:"Confidentiality means information should be shared only with authorized people who need to know. Investigation reports should be carefully distributed. Casual discussion of allegations can create defamation risk, alert subjects, or damage morale."},
    {type:"p", text:"Reports should distinguish facts, analysis, and conclusions. They should avoid inflammatory language and unsupported accusations. Strong reports explain scope, procedures, evidence, limitations, findings, and recommendations."},
    {type:"sub", text:"Legal liability"},
    {type:"p", text:"Fraud examiners can face claims such as defamation, invasion of privacy, malicious prosecution, negligence, or interference with employment if they act carelessly. Good documentation, fair process, evidence-based conclusions, and coordination with counsel reduce risk."},
    {type:"callout", text:"Exam tip: When ethics questions involve pressure to change findings, ignore evidence, disclose information broadly, or work beyond competence, choose the answer that protects objectivity and professional standards."}
  ]
};

const QUIZ_BANK = {

    {q:"Which statement best describes double-entry accounting?", options:["Every transaction affects at least two accounts","Only cash transactions are recorded","Only year-end entries require approval","Debits must always increase assets"], answer:0, explain:"Double-entry accounting records equal debits and credits across at least two accounts."},
    {q:"Which account assertion is most directly affected by fictitious revenue?", options:["Occurrence/existence","Payroll authorization","Physical custody","Bank cutoff only"], answer:0, explain:"Fictitious revenue records sales that did not occur and often creates receivables that do not exist."},
    {q:"What does segregation of duties primarily reduce?", options:["Opportunity","Pressure","Rationalization","Market risk"], answer:0, explain:"Segregation of duties reduces the opportunity to both commit and conceal fraud."},
    {q:"High net income with weak operating cash flow is a red flag for what?", options:["Possible accrual manipulation","Guaranteed insolvency","Normal cash sales only","Strong inventory controls"], answer:0, explain:"Accrual-based earnings can be manipulated more easily than cash flow."},
    {q:"Which control best detects differences between book cash and bank cash?", options:["Bank reconciliation","Ethics survey","Sales forecast","Vendor onboarding"], answer:0, explain:"Bank reconciliations compare accounting records to independent bank records."},
    {q:"Capitalizing an expense improperly does what?", options:["Overstates assets and income","Understates assets and income","Only affects cash flow","Has no income effect"], answer:0, explain:"Capitalizing expenses delays expense recognition and inflates assets and current income."},

    {q:"What is the accounting equation?", options:["Assets = Liabilities + Equity","Revenue = Cash + Debt","Assets = Revenue - Expenses","Equity = Sales + Payroll"], answer:0, explain:"The basic accounting equation is Assets = Liabilities + Equity."},
    {q:"Why should controls be matched to the fraud point?", options:["A control must address where the scheme occurs","All controls detect all frauds","Only preventive controls matter","Detective controls are unnecessary"], answer:0, explain:"Skimming, larceny, billing fraud, and financial statement fraud leave different evidence."}
  ]

function defaultQuiz(topic) {
  return [
    {q:`What is the most important first step when reviewing ${topic}?`, options:["Understand the scheme and likely evidence","Assume the suspect is guilty","Skip documentation","Interview the subject first every time"], answer:0, explain:"Start by understanding the scheme, records, controls, and evidence before drawing conclusions."},
    {q:"Which is generally strongest in a fraud examination?", options:["Corroborated documentary evidence","Rumor only","A single unsupported opinion","Anonymous accusation with no follow-up"], answer:0, explain:"Corroborated documents and data are more reliable than unsupported statements."},
    {q:"What should a fraud examiner avoid?", options:["Confirmation bias","Documenting work","Maintaining custody records","Following the evidence"], answer:0, explain:"Confirmation bias can cause the examiner to ignore contradictory evidence."},
    {q:"Which action improves fraud prevention?", options:["Segregating incompatible duties","Letting one person control all steps","Removing review controls","Sharing passwords"], answer:0, explain:"Segregation of duties limits the ability to commit and conceal fraud."},
    {q:"Which best describes a red flag?", options:["An indicator requiring follow-up","Definitive proof of fraud","A reason to skip controls","A legal conviction"], answer:0, explain:"Red flags signal risk but must be corroborated."},
    {q:"Why are explanations important in quizzes and investigations?", options:["They connect facts to principles","They replace evidence","They prove intent alone","They eliminate the need for review"], answer:0, explain:"Explanations help connect facts, controls, and fraud concepts."},
    {q:"Which response is best when evidence conflicts with your theory?", options:["Revise the theory and investigate further","Ignore the conflict","Hide the evidence","Stop documenting"], answer:0, explain:"Objectivity requires revising theories as evidence develops."},
    {q:"Which concept is most tied to fraud opportunity?", options:["Weak controls","Personal debt only","Rationalization only","Industry reputation"], answer:0, explain:"Weak controls create opportunities to commit and conceal fraud."},
    {q:"Which is a good study approach for this topic?", options:["Connect definitions to examples and controls","Memorize isolated words only","Ignore exceptions","Study only one domain"], answer:0, explain:"CFE questions often require applying concepts to scenarios."},
    {q:"What should happen after a control weakness is found?", options:["Assign remediation and follow up","Forget it after reporting","Punish randomly","Disable monitoring"], answer:0, explain:"Weaknesses should be remediated, owned, tracked, and validated."}
  ];
}

function enrichContent() {
  Object.entries(CONTENT).forEach(([section, topics]) => {
    Object.entries(topics).forEach(([topic, items]) => {
      if (!items.some(item => item.type === 'h' && item.text === 'Expanded CFE Exam Notes')) {
        items.push(...(EXTRA_READING[topic] || []));
      }
      if (!items.some(item => item.type === 'h' && item.text.startsWith('Beginner Deep Dive'))) {
        items.push(...(BEGINNER_READING[topic] || []));
      }
      if (!items.some(item => item.type === 'quiz')) {
        items.push({
          type: 'quiz',
          id: 'quiz-' + topic.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
          title: topic + ' — 10 Question Check',
          questions: QUIZ_BANK[topic] || defaultQuiz(topic)
        });
      }
    });
  });
}

let currentSection = null;
let currentTopic = null;
let paras = [];
let currentIdx = 0;
let isPlaying = false;
let speed = 1.0;
let utterance = null;

function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  Object.entries(CONTENT).forEach(([sec, topics]) => {
    const sb = document.createElement('button');
    sb.className = 'section-btn';
    sb.textContent = sec;
    sb.onclick = () => loadSection(sec);
    nav.appendChild(sb);
    Object.keys(topics).forEach(topic => {
      const tb = document.createElement('button');
      tb.className = 'topic-btn';
      tb.textContent = topic;
      tb.onclick = () => loadTopic(sec, topic);
      nav.appendChild(tb);
    });
  });
}

function loadSection(sec) {
  const firstTopic = Object.keys(CONTENT[sec])[0];
  loadTopic(sec, firstTopic);
}

function loadTopic(sec, topic) {
  stopReading();
  currentSection = sec;
  currentTopic = topic;
  currentIdx = 0;
  document.querySelectorAll('.section-btn').forEach(b => b.classList.toggle('active', b.textContent === sec));
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.toggle('active', b.textContent === topic));
  document.getElementById('section-title').textContent = sec;
  document.getElementById('topic-title').textContent = topic;
  document.getElementById('st-section').textContent = 'Section: ' + sec;
  document.getElementById('st-topic').textContent = 'Topic: ' + topic;
  const raw = CONTENT[sec][topic];
  paras = raw.filter(x => x.type === 'p' || x.type === 'callout');
  renderContent(raw);
  updateHighlight();
  updateProgress();

  // Always start a newly selected topic at the top of the reading pane.
  const contentArea = document.getElementById('content-area');
  if (contentArea) contentArea.scrollTop = 0;
}

function renderContent(items) {
  const el = document.getElementById('content');
  el.innerHTML = '';
  let pIdx = 0;
  items.forEach(item => {
    let d = document.createElement('div');
    if (item.type === 'h') {
      d.className = 'heading';
      d.textContent = item.text;
    } else if (item.type === 'sub') {
      d.className = 'subheading';
      d.textContent = item.text;
    } else if (item.type === 'quiz') {
      d.className = 'quiz-block';
      d.innerHTML = renderQuiz(item);
    } else if (item.type === 'callout') {
      d.className = 'callout';
      d.dataset.pidx = pIdx++;
      d.textContent = item.text;
      d.onclick = () => jumpTo(parseInt(d.dataset.pidx));
    } else {
      d.className = 'para';
      d.dataset.pidx = pIdx++;
      d.textContent = item.text;
      d.onclick = () => jumpTo(parseInt(d.dataset.pidx));
    }
    el.appendChild(d);
  });
}


function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function renderQuiz(item) {
  const quizId = item.id || ('quiz-' + Math.random().toString(36).slice(2));
  const questions = item.questions || [];
  return `
    <h3>${escapeHtml(item.title || 'Quick Check')}</h3>
    <p class="quiz-intro">Answer these 10 questions to confirm you understood this subsection.</p>
    ${questions.map((q, qi) => `
      <div class="quiz-question" data-q="${qi}">
        <p>${qi + 1}. ${escapeHtml(q.q)}</p>
        ${q.options.map((opt, oi) => `
          <label class="quiz-option">
            <input type="radio" name="${quizId}-${qi}" value="${oi}">
            ${escapeHtml(opt)}
          </label>
        `).join('')}
      </div>
    `).join('')}
    <div class="quiz-actions">
      <button type="button" onclick="gradeQuiz('${quizId}')">Check answers</button>
      <button type="button" onclick="resetQuiz('${quizId}')">Reset quiz</button>
      <span class="quiz-result" id="${quizId}-result"></span>
    </div>
    <div class="quiz-feedback" id="${quizId}-feedback"></div>
  `;
}

function findQuizById(quizId) {
  for (const topics of Object.values(CONTENT)) {
    for (const items of Object.values(topics)) {
      const found = items.find(item => item.type === 'quiz' && item.id === quizId);
      if (found) return found;
    }
  }
  return null;
}

function gradeQuiz(quizId) {
  const quiz = findQuizById(quizId);
  if (!quiz) return;
  let score = 0;
  const feedback = [];
  quiz.questions.forEach((q, qi) => {
    const selected = document.querySelector(`input[name="${quizId}-${qi}"]:checked`);
    const selectedIndex = selected ? parseInt(selected.value, 10) : -1;
    const correct = selectedIndex === q.answer;
    if (correct) score++;
    feedback.push(`<div class="${correct ? 'correct' : 'wrong'}"><strong>${qi + 1}. ${correct ? 'Correct' : 'Review'}:</strong> ${escapeHtml(q.explain)}</div>`);
  });
  document.getElementById(`${quizId}-result`).textContent = `Score: ${score} / ${quiz.questions.length}`;
  document.getElementById(`${quizId}-feedback`).innerHTML = feedback.join('');
}

function resetQuiz(quizId) {
  document.querySelectorAll(`input[name^="${quizId}-"]`).forEach(input => input.checked = false);
  const result = document.getElementById(`${quizId}-result`);
  const feedback = document.getElementById(`${quizId}-feedback`);
  if (result) result.textContent = '';
  if (feedback) feedback.innerHTML = '';
}

function jumpTo(idx) {
  stopReading();
  currentIdx = idx;
  updateHighlight();
  updateProgress();
}

function togglePlay() {
  if (isPlaying) { stopReading(); }
  else { startReading(); }
}

function startReading() {
  if (!currentSection) { loadSection(Object.keys(CONTENT)[0]); return; }
  if (currentIdx >= paras.length) { currentIdx = 0; }
  isPlaying = true;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  document.getElementById('btn-play').classList.add('active');
  document.getElementById('st-status').textContent = 'Reading...';
  speakCurrent();
}

function stopReading() {
  isPlaying = false;
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('btn-play').classList.remove('active');
  document.getElementById('st-status').textContent = 'Paused';
}

function speakCurrent() {
  if (!isPlaying || currentIdx >= paras.length) {
    if (isPlaying) { stopReading(); document.getElementById('st-status').textContent = 'Section complete'; }
    return;
  }
  updateHighlight();
  updateProgress();
  scrollToCurrent();
  const text = paras[currentIdx].text;
  utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = speed;
  utterance.onend = () => { if (isPlaying) { currentIdx++; speakCurrent(); } };
  utterance.onerror = (e) => { if (e.error !== 'interrupted') { currentIdx++; if (isPlaying) speakCurrent(); } };
  window.speechSynthesis.speak(utterance);
}

function updateHighlight() {
  document.querySelectorAll('.para, .callout').forEach(el => {
    const idx = parseInt(el.dataset.pidx);
    el.classList.remove('reading', 'done');
    if (idx === currentIdx) el.classList.add('reading');
    else if (idx < currentIdx) el.classList.add('done');
  });
  document.getElementById('para-counter').textContent = paras.length ? `${currentIdx + 1} / ${paras.length}` : '';
}

function scrollToCurrent() {
  const el = document.querySelector(`[data-pidx="${currentIdx}"]`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function prevPara() {
  stopReading();
  if (currentIdx > 0) currentIdx--;
  updateHighlight();
  updateProgress();
  scrollToCurrent();
}

function nextPara() {
  stopReading();
  if (currentIdx < paras.length - 1) currentIdx++;
  updateHighlight();
  updateProgress();
  scrollToCurrent();
}

function restartSection() {
  stopReading();
  currentIdx = 0;
  updateHighlight();
  updateProgress();
  document.getElementById('content-area').scrollTop = 0;
}

function changeSpeed(val) {
  speed = parseFloat(val);
  document.getElementById('speed-val').textContent = speed.toFixed(1) + '×';
  if (isPlaying && utterance) {
    stopReading();
    startReading();
  }
}

function updateProgress() {
  const pct = paras.length ? Math.round((currentIdx / paras.length) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

enrichContent();
buildNav();
loadSection(Object.keys(CONTENT)[0]);
</script>
</body>
</html>
